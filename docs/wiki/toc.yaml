notes:
  - "deepwiki-skill is a tooling/DevOps project: an apm 'hybrid' package bundling a wiki skill, a workflow-runner agent, and a gen-wiki prompt."
  - "Page groupings follow logical function rather than directory names: orchestration primitives, workflow phases, helper scripts, and governing policies are separated."
  - "Source files live under .apm/ at author time; apm compiles them into harness-specific locations (e.g. .claude/skills/wiki/) at install time."
  - "The project is small (33 files); a focused 6-page structure covers all major aspects without fragmentation."
